name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            name: linux-x86_64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            name: linux-aarch64
            cross: true
          - target: x86_64-apple-darwin
            os: macos-13
            name: macos-x86_64
          - target: aarch64-apple-darwin
            os: macos-14
            name: macos-aarch64
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            name: windows-x86_64

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross (Linux aarch64)
        if: matrix.cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build (cross)
        if: matrix.cross
        working-directory: claw-node
        run: cross build --release --target ${{ matrix.target }} -p claw-node

      - name: Build (native)
        if: "!matrix.cross"
        working-directory: claw-node
        run: cargo build --release --target ${{ matrix.target }} -p claw-node

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          cd claw-node/target/${{ matrix.target }}/release
          tar czf ../../../../claw-node-${{ matrix.name }}.tar.gz claw-node
          cd ../../../..

      - name: Package (Windows)
        if: runner.os == 'Windows'
        run: |
          cd claw-node/target/${{ matrix.target }}/release
          7z a ../../../../claw-node-${{ matrix.name }}.zip claw-node.exe
          cd ../../../..

      - uses: actions/upload-artifact@v4
        with:
          name: claw-node-${{ matrix.name }}
          path: claw-node-*.*

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            claw-node-*.tar.gz
            claw-node-*.zip
